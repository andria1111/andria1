<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json" >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Budget Tracker - Minimal</title>
    <style>
        :root {
            --bg: #000000;
            --panel: #0a0a0a;
            --white: #ffffff;
            --gray: #666666;
            --border: #222222;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg);
            color: var(--white);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 80px 20px;
            letter-spacing: -0.02em;
        }

        .c { 
            background: var(--panel); 
            padding: 50px; 
            border-radius: 0; 
            width: 100%;
            max-width: 440px; 
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            position: relative;
        }

        h3 { 
            font-size: 0.7rem; 
            color: var(--gray);
            letter-spacing: 0.2em;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 400;
        }

        .amt-display {
            font-weight: 300;
            font-size: 4rem;
            text-align: left;
            margin-bottom: 40px;
            color: var(--white);
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .peso-sign { font-size: 1.5rem; vertical-align: middle; margin-right: 5px; color: var(--gray); }

        input { 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 15px; 
            padding: 15px 0; 
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--white);
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        input:focus { 
            border-bottom-color: var(--white);
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }

        button { 
            padding: 15px; 
            background: var(--white); 
            color: var(--bg); 
            border: none; 
            cursor: pointer; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: 0.2s;
            font-size: 0.75rem;
        }

        button:hover { 
            background: #ccc;
            transform: translateY(-2px);
        }

        .clr { 
            background: transparent; 
            color: var(--gray); 
            border: 1px solid var(--border);
        }

        .clr:hover { color: var(--white); border-color: var(--white); background: transparent; }

        ul { list-style: none; padding: 0; margin-top: 50px; }

        li { 
            padding: 20px 0; 
            border-bottom: 1px solid var(--border);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item-row { font-weight: 400; color: #eee; font-size: 0.95rem; }
        .amt-row { font-weight: 500; color: var(--white); font-size: 0.95rem; }
        
        .r { 
            color: var(--gray); 
            cursor: pointer; 
            margin-left: 15px; 
            font-size: 0.8rem;
            transition: 0.2s; 
        }
        .r:hover { color: var(--white); }

        @media (max-width: 480px) {
            .c { padding: 30px; }
            .amt-display { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div class="c">
    <h3>Current Balance</h3>
    <div class="amt-display"><span class="peso-sign">&#8369;</span><span id="t">0.00</span></div>
    
    <input type="text" id="k" placeholder="Description">
    <input type="number" id="v" placeholder="0.00">

    <div class="btn-grid">
        <button onclick="fn_a()">Add Entry</button>
        <button class="clr" onclick="fn_c()">Clear All</button>
    </div>

    <ul id="l"></ul>
</div>

<script>
    const _U = "https://wwxywwyvkuphpppsfxmo.supabase.co";// supabase url
    const _K = "sb_publishable_L3aYQiXP-EFlfCQiAv1jaw_-YmYkwM_"; // Publishable key
    const db = supabase.createClient(_U, _K);

    const _t = document.getElementById('t');
    const _l = document.getElementById('l');
    const _k = document.getElementById('k');
    const _v = document.getElementById('v');

    async function fn_s() {
        let { data: rs, error: err } = await db.from('budget_db').select('*');
        if (err) return;

        _l.innerHTML = "";
        let total = 0;
        rs.forEach(i => {
            total += i.amount;
            let row = document.createElement('li');
            row.innerHTML = `
                <div class="item-row">${i.item}</div> 
                <div class="amt-row">
                    &#8369;${i.amount.toFixed(2)} 
                    <i class="fas fa-trash-alt r" onclick="fn_x(${i.id})"></i>
                </div>
            `;
            _l.appendChild(row);
        });
        _t.innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    async function fn_a() {
        let n = _k.value;
        let p = parseFloat(_v.value);
        if (n && p > 0) {
            await db.from('budget_db').insert([{ item: n, amount: p }]);
            fn_s(); 
            _k.value = ''; _v.value = '';
        }
    }

    async function fn_x(id) {
        await db.from('budget_db').delete().eq('id', id);
        fn_s();
    }

    async function fn_c() {
        if(confirm("Confirm deletion?")) {
            await db.from('budget_db').delete().neq('id', 0);
            fn_s();
        }
    }

    fn_s();

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js")
        .then(() => console.log("Ready"))
        .catch((e) => console.log(e));
    }
</script>

</body>

</html>
